<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASH ROOM — Retro Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        :root {
            --bg:        #020b12;
            --panel:     #041824;
            --border:    #00ffe7;
            --border-dim:rgba(0,255,231,0.18);
            --accent:    #ff3c6e;
            --gold:      #ffd700;
            --green:     #39ff14;
            --text:      #c8f0ea;
            --muted:     #4a7a82;
            --font-main: 'VT323', monospace;
            --font-mono: 'Share Tech Mono', monospace;
            --sidebar-w: 270px;
        }
        *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            position: relative;
        }
        /* CRT scanlines */
        body::before {
            content: "";
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.18) 2px, rgba(0,0,0,.18) 4px);
            pointer-events: none; z-index: 999;
        }
        /* Vignette */
        body::after {
            content: "";
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.75) 100%);
            pointer-events: none; z-index: 998;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--panel);
            border-right: 2px solid var(--border);
            box-shadow: 4px 0 24px rgba(0,255,231,.12);
            display: flex; flex-direction: column;
            flex-shrink: 0; z-index: 10; overflow: hidden;
        }
        .logo-box {
            padding: 20px 18px 14px;
            border-bottom: 1px dashed var(--border-dim);
            text-align: center;
        }
        .logo {
            font-size: 40px; color: var(--border);
            text-shadow: 0 0 6px var(--border), 0 0 22px var(--border);
            letter-spacing: 3px; animation: flicker 4s infinite alternate; line-height: 1;
        }
        .logo-sub {
            font-family: var(--font-mono); font-size: 10px;
            color: var(--muted); letter-spacing: 4px; margin-top: 4px;
        }
        .search-box {
            padding: 10px 12px;
            border-bottom: 1px dashed var(--border-dim);
        }
        .search-wrap {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,255,231,.05); border: 1px solid var(--border-dim);
            padding: 6px 10px; transition: border-color .2s;
        }
        .search-wrap:focus-within { border-color: var(--border); box-shadow: 0 0 10px rgba(0,255,231,.2); }
        .search-icon { color: var(--border); font-size: 15px; opacity:.7; }
        .search-input {
            background: transparent; border: none; outline: none;
            color: var(--text); font-family: var(--font-main); font-size: 20px;
            width: 100%; caret-color: var(--border);
        }
        .search-input::placeholder { color: var(--muted); }

        .filter-tabs {
            display: flex; gap: 0;
            border-bottom: 1px dashed var(--border-dim);
            overflow-x: auto; flex-shrink: 0;
        }
        .filter-tabs::-webkit-scrollbar { height: 3px; }
        .filter-tabs::-webkit-scrollbar-thumb { background: var(--border-dim); }
        .filter-tab {
            background: transparent; border: none;
            border-right: 1px solid var(--border-dim);
            color: var(--muted); font-family: var(--font-main);
            font-size: 16px; padding: 7px 10px;
            cursor: pointer; transition: all .2s; white-space: nowrap; flex-shrink: 0;
        }
        .filter-tab:hover { color: var(--border); background: rgba(0,255,231,.06); }
        .filter-tab.active { color: var(--bg); background: var(--border); }

        .section-label {
            padding: 7px 14px 3px;
            font-size: 13px; color: var(--muted);
            font-family: var(--font-mono); letter-spacing: 2px;
        }
        .game-list {
            flex: 1; overflow-y: auto;
            padding: 5px 10px 10px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .game-list::-webkit-scrollbar { width: 5px; }
        .game-list::-webkit-scrollbar-track { background: transparent; }
        .game-list::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

        .game-btn {
            background: transparent;
            border: 1px solid var(--border-dim);
            color: #7ab8be; font-family: var(--font-main); font-size: 20px;
            padding: 8px 10px 8px 22px;
            text-align: left; cursor: pointer;
            transition: all .15s ease; position: relative;
            display: flex; justify-content: space-between; align-items: center;
        }
        .game-btn .game-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-btn .badge-wrap { display: flex; gap: 4px; flex-shrink: 0; margin-left: 6px; }
        .game-btn .tag {
            font-size: 12px; padding: 1px 5px;
            border: 1px solid; opacity: .65; line-height: 1.4;
        }
        .game-btn .broken-tag {
            font-size: 11px; padding: 1px 4px;
            border: 1px solid var(--accent); color: var(--accent); opacity: .7;
        }
        .game-btn::before {
            content: "▶"; position: absolute; left: 7px; font-size: 11px;
            opacity: 0; transition: opacity .15s; color: var(--border);
        }
        .game-btn:hover {
            background: rgba(0,255,231,.07); border-color: var(--border);
            color: var(--border); text-shadow: 0 0 6px var(--border);
        }
        .game-btn:hover::before { opacity: 1; }
        .game-btn.active {
            background: var(--border); color: var(--bg);
            border-color: #fff; box-shadow: 0 0 14px rgba(0,255,231,.5);
        }
        .game-btn.active::before { opacity: 1; color: var(--bg); }
        .game-btn.has-error { border-color: rgba(255,60,110,.25); }
        .game-btn.has-error:hover { border-color: var(--accent); }
        .no-results { text-align: center; color: var(--muted); font-size: 20px; padding: 20px; }

        .sidebar-footer {
            padding: 8px 14px;
            border-top: 1px dashed var(--border-dim);
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-mono); font-size: 11px; color: var(--muted);
        }
        .sidebar-footer a { color: var(--border); text-decoration: none; }
        .sidebar-footer a:hover { text-shadow: 0 0 6px var(--border); }
        .count-badge {
            background: var(--border); color: var(--bg);
            padding: 1px 7px; font-family: var(--font-main); font-size: 17px;
        }

        /* ── MAIN ── */
        .main {
            flex: 1; display: flex; flex-direction: column;
            padding: 16px 18px 12px; min-width: 0;
        }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; margin-bottom: 14px;
            border-bottom: 2px solid var(--border-dim);
        }
        .game-title-display {
            font-size: 26px; color: var(--border);
            text-shadow: 0 0 8px rgba(0,255,231,.35);
            min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .sys-bar {
            display: flex; gap: 16px; font-family: var(--font-mono);
            font-size: 11px; color: var(--green); flex-shrink: 0; padding-left: 12px;
        }
        .blink { animation: blink 1.2s step-end infinite; }

        /* ── VIEWPORT ── */
        .viewport {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; min-height: 0;
        }
        .viewport::before, .viewport::after, .viewport .c3, .viewport .c4 {
            content: ""; position: absolute; width: 18px; height: 18px;
            border-color: var(--accent); border-style: solid; z-index: 2;
        }
        .viewport::before  { top:0;    left:0;  border-width: 2px 0 0 2px; }
        .viewport::after   { top:0;    right:0; border-width: 2px 2px 0 0; }
        .viewport .c3      { bottom:0; left:0;  border-width: 0 0 2px 2px; }
        .viewport .c4      { bottom:0; right:0; border-width: 0 2px 2px 0; }

        /* Placeholder */
        .placeholder { text-align: center; pointer-events: none; }
        .placeholder-big {
            font-size: 50px; color: var(--border);
            text-shadow: 0 0 12px var(--border);
            animation: blink 1.4s step-end infinite; letter-spacing: 4px;
        }
        .placeholder-sub {
            font-family: var(--font-mono); font-size: 12px;
            color: var(--muted); margin-top: 8px; letter-spacing: 3px;
        }

        /* Game frame */
        .game-frame {
            width: 100%; max-width: 800px; aspect-ratio: 4/3;
            border: 2px solid var(--border);
            box-shadow: 0 0 30px rgba(0,255,231,.2), inset 0 0 30px rgba(0,0,0,.5);
            background: #000; display: none; position: relative; overflow: hidden;
        }
        #ruffle-container { width: 100%; height: 100%; }

        /* ── ERROR OVERLAY ── */
        .error-overlay {
            display: none;
            position: absolute; inset: 0;
            background: rgba(2,11,18,.92);
            flex-direction: column;
            justify-content: center; align-items: center;
            gap: 12px; z-index: 20; padding: 20px; text-align: center;
        }
        .error-overlay.visible { display: flex; }
        .error-icon { font-size: 52px; color: var(--accent); line-height: 1; }
        .error-title { font-size: 28px; color: var(--accent); letter-spacing: 2px; }
        .error-body {
            font-family: var(--font-mono); font-size: 12px;
            color: var(--muted); line-height: 1.7; max-width: 480px;
        }
        .error-body strong { color: var(--text); }
        .error-body code {
            background: rgba(0,255,231,.08); border: 1px solid var(--border-dim);
            padding: 2px 6px; color: var(--border); font-size: 11px;
        }
        .error-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }
        .err-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--border); font-family: var(--font-main); font-size: 20px;
            padding: 8px 18px; cursor: pointer; transition: all .2s;
        }
        .err-btn:hover { background: var(--border); color: var(--bg); }
        .err-btn.accent { border-color: var(--accent); color: var(--accent); }
        .err-btn.accent:hover { background: var(--accent); color: var(--bg); }

        /* ── STATUS BAR ── */
        .statusbar {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 8px; margin-top: 8px;
            border-top: 1px dashed var(--border-dim);
            font-family: var(--font-mono); font-size: 11px; color: var(--muted);
        }
        .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; background: var(--green); }
        .status-dot.err { background: var(--accent); animation: blink .8s step-end infinite; }
        .status-dot.warn { background: var(--gold); }

        /* ── ANIMATIONS ── */
        @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
        @keyframes flicker {
            0%,100%{opacity:1} 3%{opacity:.7} 6%{opacity:1}
            40%{opacity:1} 41%{opacity:.3} 42%{opacity:1}
            72%{opacity:1} 73%{opacity:.6} 74%{opacity:1}
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 820px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .sidebar { width: 100%; max-height: 260px; border-right: none; border-bottom: 2px solid var(--border); }
            .game-list { flex-direction: row; overflow-x: auto; overflow-y: hidden; }
            .game-btn { min-width: 150px; }
            .main { padding: 10px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-box">
        <div class="logo">FLASH ROOM</div>
        <div class="logo-sub">ARCADE EMULATOR v2.1</div>
    </div>
    <div class="search-box">
        <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input class="search-input" id="search-input" type="text" placeholder="TÌM KIẾM..." autocomplete="off" spellcheck="false">
        </div>
    </div>
    <div class="filter-tabs" id="filter-tabs"></div>
    <div class="section-label" id="list-label">-- DANH SÁCH --</div>
    <nav class="game-list" id="game-list"></nav>
    <div class="sidebar-footer">
        <span>Powered by <a href="https://ruffle.rs/" target="_blank">Ruffle</a></span>
        <span class="count-badge" id="count-badge">0</span>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <div class="game-title-display" id="display-title">▌ CHƯA CHỌN GAME</div>
        <div class="sys-bar">
            <span>MEM:<span class="blink" style="margin-left:3px">OK</span></span>
            <span>CPU:00%</span>
            <span id="clock">00:00:00</span>
        </div>
    </div>

    <div class="viewport" id="viewport">
        <span class="c3"></span><span class="c4"></span>

        <div class="placeholder" id="placeholder">
            <div class="placeholder-big">INSERT COIN</div>
            <div class="placeholder-sub">CHỌN GAME TỪ MENU BÊN TRÁI</div>
        </div>

        <div class="game-frame" id="game-frame">
            <div id="ruffle-container"></div>
            <!-- Error overlay bên trong game frame -->
            <div class="error-overlay" id="error-overlay">
                <div class="error-icon">⚠</div>
                <div class="error-title" id="err-title">LỖI TẢI GAME</div>
                <div class="error-body" id="err-body"></div>
                <div class="error-actions">
                    <button class="err-btn" id="btn-retry">↺ THỬ LẠI</button>
                    <button class="err-btn accent" id="btn-dismiss">✕ ĐÓNG</button>
                </div>
            </div>
        </div>
    </div>

    <div class="statusbar">
        <span><span class="status-dot" id="status-dot"></span><span id="status-msg">SYS.READY</span></span>
        <span>FLASH ROOM © 2025</span>
    </div>
</main>

    {

];

// ── STATE ──
let activeGenre = "ALL";
let searchQuery = "";
let activeId    = null;
let ruffleInst  = null;
let currentGame = null;

// ── GENRE LIST ──
const genres = ["ALL", ...new Set(GAMES.map(g => g.genre))];

// ── DOM ──
const filterTabsEl = document.getElementById("filter-tabs");
const gameListEl   = document.getElementById("game-list");
const listLabelEl  = document.getElementById("list-label");
const countBadgeEl = document.getElementById("count-badge");
const searchInput  = document.getElementById("search-input");
const displayTitle = document.getElementById("display-title");
const placeholder  = document.getElementById("placeholder");
const gameFrame    = document.getElementById("game-frame");
const ruffleContainer = document.getElementById("ruffle-container");
const statusMsg    = document.getElementById("status-msg");
const statusDot    = document.getElementById("status-dot");
const clockEl      = document.getElementById("clock");
const errorOverlay = document.getElementById("error-overlay");
const errTitle     = document.getElementById("err-title");
const errBody      = document.getElementById("err-body");

// ── CLOCK ──
setInterval(() => {
    const n = new Date(), p = x => String(x).padStart(2,"0");
    clockEl.textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}, 1000);

// ── STATUS ──
function setStatus(msg, type="ok") {
    statusMsg.textContent = msg;
    statusDot.className = "status-dot" + (type==="err"?" err":type==="warn"?" warn":"");
}

// ── ERROR OVERLAY ──
function showError(title, bodyHtml) {
    errTitle.textContent = title;
    errBody.innerHTML = bodyHtml;
    errorOverlay.classList.add("visible");
}
function hideError() {
    errorOverlay.classList.remove("visible");
}
document.getElementById("btn-dismiss").addEventListener("click", () => {
    hideError();
    gameFrame.style.display = "none";
    placeholder.style.display = "block";
    activeId = null;
    displayTitle.innerHTML = "▌ CHƯA CHỌN GAME";
    setStatus("SYS.READY");
    renderList();
});
document.getElementById("btn-retry").addEventListener("click", () => {
    if (currentGame) { hideError(); loadGame(currentGame); }
});

// ── RENDER TABS ──
function renderTabs() {
    filterTabsEl.innerHTML = "";
    genres.forEach(g => {
        const btn = document.createElement("button");
        btn.className = "filter-tab" + (g === activeGenre ? " active" : "");
        btn.textContent = g;
        btn.addEventListener("click", () => { activeGenre = g; renderTabs(); renderList(); });
        filterTabsEl.appendChild(btn);
    });
}

// ── RENDER LIST ──
const TAG_COLORS = { Action:"#ff3c6e",Shooter:"#ff3c6e",Fighting:"#ff9900",Platform:"#39ff14",Classic:"#00ffe7",VS:"#b967ff",Jump:"#39ff14",Arcade:"#ffd700" };
function tagColor(t) { return TAG_COLORS[t] || "#aaa"; }

function renderList() {
    const q = searchQuery.trim().toLowerCase();
    const filtered = GAMES.filter(g => {
        const mG = activeGenre === "ALL" || g.genre === activeGenre;
        const mS = !q || g.title.toLowerCase().includes(q) || g.genre.toLowerCase().includes(q) || (g.tags||[]).some(t => t.toLowerCase().includes(q));
        return mG && mS;
    });
    countBadgeEl.textContent = filtered.length;
    listLabelEl.textContent  = `-- ${activeGenre === "ALL" ? "TẤT CẢ" : activeGenre.toUpperCase()} (${filtered.length}) --`;
    gameListEl.innerHTML = "";
    if (!filtered.length) { gameListEl.innerHTML = `<div class="no-results">[ KHÔNG TÌM THẤY ]</div>`; return; }
    filtered.forEach(game => {
        const btn = document.createElement("button");
        const hasWarn = game.needsNetwork || game.type === "local";
        btn.className = "game-btn" + (game.id === activeId ? " active" : "") + (hasWarn ? " has-error" : "");
        const tagHtml = `<span class="tag" style="color:${tagColor(game.genre)};border-color:${tagColor(game.genre)}">${game.genre}</span>`;
        const warnHtml = game.needsNetwork ? `<span class="broken-tag">CORS</span>` : (game.type === "local" ? `<span class="broken-tag">LOCAL</span>` : "");
        btn.innerHTML = `<span class="game-name">${game.title}</span><span class="badge-wrap">${tagHtml}${warnHtml}</span>`;
        btn.title = game.description || game.title;
        btn.addEventListener("click", () => loadGame(game));
        gameListEl.appendChild(btn);
    });
}

searchInput.addEventListener("input", e => { searchQuery = e.target.value; renderList(); });
searchInput.addEventListener("keydown", e => { if (e.key === "Escape") { searchInput.value = ""; searchQuery = ""; renderList(); } });

// ── LOAD GAME ──
function loadGame(game) {
    currentGame = game;
    activeId = game.id;
    renderList();
    hideError();

    displayTitle.innerHTML = `▶ LOADING: <span style="color:#fff">${game.title}</span>`;
    setStatus(`LOADING: ${game.title}...`, "warn");

    placeholder.style.display = "none";
    gameFrame.style.display   = "block";

    // Cảnh báo sớm nếu game cần network (CORS issue)
    if (game.needsNetwork) {
        displayTitle.innerHTML = `▶ <span style="color:var(--accent)">CORS WARNING:</span> ${game.title}`;
        setStatus(`⚠ SWF này load resource bên ngoài → bị CORS khi host tĩnh`, "err");
        showError(
            "⚠ CORS / NETWORK ERROR",
            `<strong>Nguyên nhân:</strong> File <code>${game.title}</code> là một <strong>Nitrome preloader SWF</strong>.<br>
            Nó cố tải <code>Adunit.swf</code> từ <code>s3.amazonaws.com</code> — bị browser chặn vì<br>
            <strong>CORS policy</strong> khi chạy trên static hosting (GitHub Pages, Netlify…).<br><br>
            <strong>Cách fix:</strong><br>
            1. Thay bằng SWF <em>self-contained</em> (không load URL bên ngoài)<br>
            2. Hoặc dùng <strong>CORS proxy server</strong> (Node.js/nginx) để relay request<br>
            3. Hoặc chạy local: <code>python3 -m http.server 8080</code><br><br>
            <strong>Khuyến nghị:</strong> Tải SWF gốc từ <a href="https://archive.org/details/softwarelibrary_flash" target="_blank" style="color:var(--border)">Internet Archive</a>`
        );
        return;
    }

    if (!window.RufflePlayer) {
        setStatus("LỖI: Ruffle chưa load — kiểm tra kết nối mạng", "err");
        showError("RUFFLE KHÔNG TẢI ĐƯỢC", `Kiểm tra kết nối internet.<br>Ruffle cần tải từ <code>unpkg.com</code>`);
        return;
    }

    if (ruffleInst) { try { ruffleInst.remove(); } catch(e){} ruffleInst = null; }

    const ruffle = window.RufflePlayer.newest();
    ruffleInst = ruffle.createPlayer();
    ruffleInst.style.width = "100%";
    ruffleInst.style.height = "100%";
    ruffleContainer.innerHTML = "";
    ruffleContainer.appendChild(ruffleInst);

    ruffleInst.load({
        url: game.swf,
        autoplay: "on",
        unmuteOverlay: "visible",
        letterbox: "fullscreen"
    }).then(() => {
        displayTitle.innerHTML = `▶ RUNNING: <span style="color:#fff">${game.title}</span>`;
        setStatus(`✓ LOADED: ${game.title}`, "ok");
    }).catch(err => {
        console.warn("SWF load error:", err);
        displayTitle.innerHTML = `▶ <span style="color:var(--accent)">ERROR:</span> ${game.title}`;
        setStatus(`⚠ Không tải được: ${game.swf}`, "err");
        showError(
            "KHÔNG TÌM THẤY FILE",
            `File <code>${game.swf}</code> không tồn tại.<br><br>
            <strong>Cách fix:</strong> Đặt file <code>.swf</code> vào thư mục <code>games/</code><br>
            cùng cấp với file <code>HTML</code> này.<br><br>
            Ví dụ cấu trúc thư mục:<br>
            <code>index.html</code><br>
            <code>games/metal_slug.swf</code><br>
            <code>games/contra.swf</code>`
        );
    });
}

// ── INIT ──
renderTabs();
renderList();
setInterval(() => {}, 1000);
</script>
</body>
</html>
